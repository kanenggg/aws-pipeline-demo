version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies..."
      - cd PLOCLO_cms && npm ci

  build:
    commands:
      - echo "Running Unit Tests..."
      - cd PLOCLO_cms && npm test

      - echo "Running Integration Tests..."
      - cd PLOCLO_cms && npm run test:integration

  post_build:
    commands:
      - echo "Test completed on $(date)"