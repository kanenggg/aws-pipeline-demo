version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci --prefix PLOCLO_cms
      - pip3 install semgrep

pre_build:
  commands:
    - export PATH=$HOME/.local/bin:/usr/local/bin:$PATH
    - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

    # ─── Start Docker daemon ────────────────────────────────
    - echo "Starting Docker daemon..."
    - nohup /usr/local/bin/dockerd \
        --host=unix:///var/run/docker.sock \
        --host=tcp://127.0.0.1:2375 \
        --storage-driver=overlay2 &
    - timeout 30 sh -c "until docker info > /dev/null 2>&1; do echo 'Waiting for Docker...'; sleep 2; done"
    - echo "Docker is ready"

    - |
        cat > PLOCLO_cms/.env << EOF
        DATABASE_URL=$DATABASE_URL
        DB_HOST=$DB_HOST
        DB_PORT=$DB_PORT
        DB_USER=$DB_USER
        DB_PASSWORD=$DB_PASSWORD
        DB_NAME=$DB_NAME
        JWT_SECRET=$JWT_SECRET
        GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
        GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
        GOOGLE_CALLBACK_URL=$GOOGLE_CALLBACK_URL
        NODE_ENV=$NODE_ENV
        NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
        EOF

    - grep -q "^\.env$" PLOCLO_cms/.dockerignore 2>/dev/null || echo ".env" >> PLOCLO_cms/.dockerignore

    - echo "[1/3] Semgrep SAST..."
    - semgrep scan --config p/default --error --quiet . --json > semgrep-report.json || true

    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | \
        docker login --username AWS --password-stdin \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "[2/3] Docker build..."
      - docker-compose -f PLOCLO_cms/docker-compose.yml build 2>&1

  post_build:
    commands:
      - echo "[3/3] Push + Inspector..."
      - docker-compose -f PLOCLO_cms/docker-compose.yml push

      # ─── Inspector CVE Poll ────────────────────────────────
      - |
        MAX_WAIT=300; ELAPSED=0; PREV=-1
        while [ $ELAPSED -lt $MAX_WAIT ]; do
          COUNT=$(aws inspector2 list-findings \
            --filter-criteria "{\"ecrImageRepositoryName\":[{\"comparison\":\"EQUALS\",\"value\":\"$IMAGE_REPO_NAME\"}]}" \
            --query 'length(findings)' --output text 2>/dev/null || echo 0)
          echo "  Inspector findings: $COUNT (${ELAPSED}s)"
          [ "$COUNT" = "$PREV" ] && [ $ELAPSED -gt 60 ] && break
          PREV=$COUNT; sleep 15; ELAPSED=$((ELAPSED+15))
        done

        aws inspector2 list-findings \
          --filter-criteria "{\"ecrImageRepositoryName\":[{\"comparison\":\"EQUALS\",\"value\":\"$IMAGE_REPO_NAME\"}],\"severity\":[{\"comparison\":\"EQUALS\",\"value\":\"CRITICAL\"}]}" \
          --output json > inspector-report.json

        CVE=$(python3 -c "import json; d=json.load(open('inspector-report.json')); print(len(d.get('findings',[])))")
        echo "Critical CVE: $CVE"
        if [ "$CVE" -gt "0" ]; then
          echo "BLOCKED: Critical CVE found"; exit 1
        fi

      # ─── Amazon Q Security Summary ─────────────────────────
      - |
        python3 -c "
        import json, os, datetime
        summary = {
          'timestamp': datetime.datetime.utcnow().isoformat(),
          'build_id': os.environ.get('CODEBUILD_BUILD_ID',''),
          'semgrep_findings': 0,
          'cve_critical': 0,
          'status': 'PASSED'
        }
        try:
          d = json.load(open('semgrep-report.json'))
          summary['semgrep_findings'] = len(d.get('results',[]))
        except: pass
        try:
          d = json.load(open('inspector-report.json'))
          summary['cve_critical'] = len(d.get('findings',[]))
        except: pass
        json.dump(summary, open('q-build-summary.json','w'), indent=2)
        print(json.dumps(summary, indent=2))
        "

      - |
        printf '[{"name":"backend","imageUri":"%s"},{"name":"frontend","imageUri":"%s"}]' \
          "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:backend-latest" \
          "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:frontend-latest" \
          > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - semgrep-report.json
    - inspector-report.json
    - q-build-summary.json
  discard-paths: yes
  name: BuildArtifacts