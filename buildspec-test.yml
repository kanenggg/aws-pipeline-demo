version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies..."
      - cd PLOCLO_cms && npm ci

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Running Unit Tests..."
      - cd PLOCLO_cms && npm test

      - echo "Running Integration Tests..."
      - cd PLOCLO_cms && npm run test:integration

      - echo "Waiting for Inspector scan results..."
      - sleep 30
      - |
        FINDINGS=$(aws inspector2 list-findings \
          --filter-criteria '{"ecrImageRepositoryName":[{"comparison":"EQUALS","value":"'"$IMAGE_REPO_NAME"'"}]}' \
          --query 'findings[?severity==`CRITICAL`]' \
          --output json)
        COUNT=$(echo $FINDINGS | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
        echo "Critical findings: $COUNT"
        if [ "$COUNT" -gt "0" ]; then
          echo "FAILED: Critical CVE found, blocking pipeline"
          exit 1
        fi

  post_build:
    commands:
      - echo "Test stage completed on $(date)"