version: 0.2

env:
  variables:
    REPO_NAME: "PLOCLO_cms"
    BRANCH_NAME: "main"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci --prefix PLOCLO_cms
      - pip install semgrep --break-system-packages

  build:
    commands:
      - echo "[1/3] Running tests..."
      - npm test --prefix PLOCLO_cms
      - npm run test:integration --prefix PLOCLO_cms

      - echo "[2/3] npm audit..."
      - |
        npm audit --prefix PLOCLO_cms --json > audit-report.json || true
        CRITICAL=$(cat audit-report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))")
        echo "Critical: $CRITICAL"
        if [ "$CRITICAL" -gt "0" ]; then
          echo "BLOCKED: critical npm vulnerabilities"; exit 1
        fi

      - echo "[3/3] Semgrep SAST + Amazon Q Dev Analysis..."
      - |
        semgrep scan PLOCLO_cms/ \
          --config "p/typescript" \
          --config "p/nodejs" \
          --config "p/jwt" \
          --config "p/sql-injection" \
          --config "p/xss" \
          --config "p/owasp-top-ten" \
          --json \
          --output semgrep-report.json \
          --exclude "node_modules" \
          --exclude "*.lock" || true

        echo "Semgrep scan complete"

        CRITICAL_COUNT=$(python3 -c "import json; d=json.load(open('semgrep-report.json')); print(len([f for f in d.get('results',[]) if f.get('extra',{}).get('severity')=='ERROR']))")

        HIGH_COUNT=$(python3 -c "import json; d=json.load(open('semgrep-report.json')); print(len([f for f in d.get('results',[]) if f.get('extra',{}).get('severity')=='WARNING']))")

        echo "Semgrep ERROR (Critical): $CRITICAL_COUNT"
        echo "Semgrep WARNING (High):   $HIGH_COUNT"

        SEMGREP_FINDINGS=$(python3 -c "import json; d=json.load(open('semgrep-report.json')); lines=['['+f.get('extra',{}).get('severity','')+'] '+f.get('check_id','')+' | '+f.get('path','')+':'+str(f.get('start',{}).get('line',''))+' | '+f.get('extra',{}).get('message','')[:200] for f in d.get('results',[])[:30]]; print('\n'.join(lines) if lines else 'No findings')")

        python3 q_analyze_test.py "$SEMGREP_FINDINGS" "$CRITICAL_COUNT" "$HIGH_COUNT"
        cat q-analysis.txt

        TOTAL=$(( CRITICAL_COUNT + HIGH_COUNT ))
        if [ "$TOTAL" -gt "0" ]; then
          echo "============================================"
          echo "BLOCKED by Amazon Q Dev Security Gate"
          echo "Critical: $CRITICAL_COUNT | High: $HIGH_COUNT"
          echo '============================================'
          echo 'กรุณาอ่าน q-analysis.txt เพื่อดูวิธีแก้ไข'
          echo '============================================'
          exit 1
        fi

        echo "Security Gate passed — proceeding to BUILD stage"

  post_build:
    commands:
      - echo "Test stage completed on $(date)"
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "0" ]; then
          echo "Build FAILED — Amazon Q Dev analysis saved to q-analysis.txt"
          cat q-analysis.txt 2>/dev/null || echo "No analysis available"
        fi

artifacts:
  files:
    - audit-report.json
    - semgrep-report.json
    - q-analysis.txt
  discard-paths: yes
  name: ScanArtifacts