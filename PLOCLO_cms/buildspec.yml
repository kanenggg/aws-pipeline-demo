version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies..."
      - cd PLOCLO_cms && npm ci
      - python3 -m pip install semgrep

  pre_build:
    commands:
      - echo "Security Review & Preparation"
      - cd PLOCLO_cms && semgrep scan --config auto --error
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Building Docker Image..."
      - docker-compose -f PLOCLO_cms/docker-compose.yml build

      - echo "Running Unit Tests..."
      - cd PLOCLO_cms && npm test

      - echo "Running Integration Tests..."
      - cd PLOCLO_cms && npm run test:integration

      - echo "Pushing to ECR for Inspector scan..."
      - docker-compose -f PLOCLO_cms/docker-compose.yml push

      - echo "Waiting for Inspector scan results..."
      - sleep 30
      - |
        FINDINGS=$(aws inspector2 list-findings \
          --filter-criteria '{"ecrImageRepositoryName":[{"comparison":"EQUALS","value":"'"$IMAGE_REPO_NAME"'"}]}' \
          --query 'findings[?severity==`CRITICAL`]' \
          --output json)
        COUNT=$(echo $FINDINGS | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
        echo "Critical findings: $COUNT"
        if [ "$COUNT" -gt "0" ]; then
          echo "FAILED: Critical CVE found, blocking pipeline"
          exit 1
        fi

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - printf '[{"name":"backend","imageUri":"%s"},{"name":"frontend","imageUri":"%s"}]' \
        "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:backend-latest" \
        "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:frontend-latest" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json