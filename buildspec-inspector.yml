version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install boto3 --quiet
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

  pre_build:
    commands:
      - IMAGE_REPO_NAME=${IMAGE_REPO_NAME:-ploclo-cms}
      - BACKEND_IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:backend-latest"
      - FRONTEND_IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:frontend-latest"
      - echo "Backend  -> $BACKEND_IMAGE"
      - echo "Frontend -> $FRONTEND_IMAGE"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "[1/4] Pull images from ECR..."
      - docker pull $BACKEND_IMAGE
      - docker pull $FRONTEND_IMAGE

      - echo "[2/4] Verify Amazon Inspector V2 is enabled..."
      - |
        ACCOUNT_STATUS=$(aws inspector2 batch-get-account-status \
          --account-ids "$AWS_ACCOUNT_ID" \
          --query 'accounts[0].resourceState.ecr.status' \
          --output text 2>&1)

        echo "Inspector ECR status: $ACCOUNT_STATUS"

        if [ "$ACCOUNT_STATUS" != "ENABLED" ]; then
          echo "ERROR: Inspector ECR scanning is not ENABLED"
          echo "Please run: aws inspector2 enable --resource-types ECR"
          exit 1
        fi

      - echo "[3/4] Polling Inspector until scan completes..."
      - |
        MAX_WAIT=1800   # รอสูงสุด 30 นาที
        POLL_INTERVAL=30
        ELAPSED=0
        FOUND=0

        echo "Polling every ${POLL_INTERVAL}s (max ${MAX_WAIT}s)..."

        while [ $ELAPSED -lt $MAX_WAIT ]; do
          RAW=$(aws inspector2 list-findings \
            --filter-criteria "{
              \"ecrImageRepositoryName\":[{\"comparison\":\"EQUALS\",\"value\":\"$IMAGE_REPO_NAME\"}],
              \"findingStatus\":[{\"comparison\":\"EQUALS\",\"value\":\"ACTIVE\"}]
            }" \
            --output json 2>/dev/null || echo "{\"findings\":[]}")

          COUNT=$(echo "$RAW" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('findings',[])))")

          echo "  [${ELAPSED}s] Findings so far: $COUNT"

          # ถ้าเจอ findings แล้ว ให้รอเพิ่มอีก 1 รอบเพื่อให้ scan เสร็จสมบูรณ์
          if [ "$COUNT" -gt "0" ]; then
            FOUND=1
            echo "  Findings detected — waiting one more interval for scan to stabilize..."
            sleep $POLL_INTERVAL
            break
          fi

          sleep $POLL_INTERVAL
          ELAPSED=$((ELAPSED + POLL_INTERVAL))
        done

        if [ $ELAPSED -ge $MAX_WAIT ] && [ $FOUND -eq 0 ]; then
          echo "WARNING: Timed out after ${MAX_WAIT}s — proceeding with 0 findings (Inspector may not have scanned yet)"
        fi

      - echo "[4/4] Collect Inspector findings..."
      - |
        # ดึง findings ทุกตัว (รวม CVE ที่ยังไม่มี fix) — ไม่มี fixAvailable filter
        aws inspector2 list-findings \
          --filter-criteria "{
            \"ecrImageRepositoryName\":[{\"comparison\":\"EQUALS\",\"value\":\"$IMAGE_REPO_NAME\"}],
            \"findingStatus\":[{\"comparison\":\"EQUALS\",\"value\":\"ACTIVE\"}]
          }" \
          --output json > inspector-raw.json 2>/dev/null || echo "{\"findings\":[]}" > inspector-raw.json

        RAW_COUNT=$(python3 -c "import json; d=json.load(open('inspector-raw.json')); print(len(d.get('findings',[])))")
        echo "Raw findings pulled: $RAW_COUNT"

        # deduplicate และสร้าง inspector-findings.json
        python3 q_analyze_inspector.py "$BACKEND_IMAGE" "$FRONTEND_IMAGE" 0 0 0

        CRITICAL=$(python3 -c "import json; d=json.load(open('inspector-findings.json')); print(len([f for f in d if f.get('severity')=='CRITICAL']))")
        HIGH=$(python3 -c "import json; d=json.load(open('inspector-findings.json')); print(len([f for f in d if f.get('severity')=='HIGH']))")
        MEDIUM=$(python3 -c "import json; d=json.load(open('inspector-findings.json')); print(len([f for f in d if f.get('severity')=='MEDIUM']))")
        LOW=$(python3 -c "import json; d=json.load(open('inspector-findings.json')); print(len([f for f in d if f.get('severity')=='LOW']))")
        TOTAL=$(python3 -c "import json; d=json.load(open('inspector-findings.json')); print(len(d))")

        echo "================================================"
        echo "Unique findings — Total: $TOTAL"
        echo "  Critical : $CRITICAL"
        echo "  High     : $HIGH"
        echo "  Medium   : $MEDIUM"
        echo "  Low      : $LOW"
        echo "================================================"

        # รัน analyze อีกครั้งพร้อม count ที่ถูกต้อง
        python3 q_analyze_inspector.py "$BACKEND_IMAGE" "$FRONTEND_IMAGE" "$CRITICAL" "$HIGH" "$MEDIUM"
        cat q-inspector-analysis.txt

        # Security Gate: block ถ้ามี Critical
        if [ "$CRITICAL" -gt "0" ]; then
          echo "BLOCKED: $CRITICAL Critical CVE(s) found — fix before deploying"
          exit 1
        fi

        echo "Inspector Security Gate passed"

  post_build:
    commands:
      - echo "Inspector scan completed on $(date)"
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "0" ]; then
          echo "=== Inspector FAILED — Analysis Report ==="
          cat q-inspector-analysis.txt 2>/dev/null || echo "(no report generated)"
        fi

artifacts:
  files:
    - "**/*"
  discard-paths: yes
  name: InspectorArtifacts