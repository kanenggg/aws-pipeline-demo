version: 0.2

env:
  variables:
    REPO_NAME: "PLOCLO_cms"
    BRANCH_NAME: "main"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci --prefix PLOCLO_cms

  build:
    commands:
      # ─── Unit + Integration Tests ──────────────────────────
      - echo "[1/3] Running tests..."
      - npm test --prefix PLOCLO_cms
      - npm run test:integration --prefix PLOCLO_cms

      # ─── npm audit ────────────────────────────────────────
      - echo "[2/3] npm audit..."
      - |
        npm audit --prefix PLOCLO_cms --json > audit-report.json || true
        CRITICAL=$(cat audit-report.json | python3 -c "
        import sys,json; d=json.load(sys.stdin)
        print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))")
        echo "Critical: $CRITICAL"
        if [ "$CRITICAL" -gt "0" ]; then
          echo "BLOCKED: critical npm vulnerabilities"; exit 1
        fi

      # ─── Amazon Q Code Review ─────────────────────────────
      - echo "[3/3] Amazon Q Code Review..."
      - |
        ASSOCIATION_ARN=$(aws codeguru-reviewer list-repository-associations \
          --query "RepositoryAssociationSummaries[?Name=='$REPO_NAME'].AssociationArn" \
          --output text)

        if [ -z "$ASSOCIATION_ARN" ]; then
          echo "No CodeGuru association — skipping Q review"
          echo '{"RecommendationSummaries":[]}' > q-review-report.json
        else
          REVIEW_ARN=$(aws codeguru-reviewer create-code-review \
            --name "q-review-$CODEBUILD_BUILD_NUMBER" \
            --repository-association-arn $ASSOCIATION_ARN \
            --type "RepositoryAnalysis={RepositoryHead={BranchName=$BRANCH_NAME}}" \
            --query 'CodeReview.CodeReviewArn' --output text)

          echo "Q Review: $REVIEW_ARN"
          ELAPSED=0
          while [ $ELAPSED -lt 300 ]; do
            STATUS=$(aws codeguru-reviewer describe-code-review \
              --code-review-arn $REVIEW_ARN \
              --query 'CodeReview.State' --output text)
            echo "  status: $STATUS (${ELAPSED}s)"
            [ "$STATUS" = "Completed" ] || [ "$STATUS" = "Failed" ] && break
            sleep 15; ELAPSED=$((ELAPSED+15))
          done

          aws codeguru-reviewer list-recommendations \
            --code-review-arn $REVIEW_ARN \
            --output json > q-review-report.json

          HIGH=$(python3 -c "
        import json
        d=json.load(open('q-review-report.json'))
        h=[r for r in d.get('RecommendationSummaries',[]) if r.get('Severity')=='High']
        print(len(h))")

          echo "Q High severity: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            echo "BLOCKED: Q found $HIGH High severity issues"; exit 1
          fi
        fi

  post_build:
    commands:
      - echo "Q-CodeReview stage passed on $(date)"

artifacts:
  files:
    - audit-report.json
    - q-review-report.json
  discard-paths: yes
  name: ScanArtifacts