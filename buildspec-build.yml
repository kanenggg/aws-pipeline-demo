version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - export PATH=$HOME/.local/bin:/usr/local/bin:$PATH
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

  pre_build:
    commands:
      - echo "Checking Docker..."
      - docker info > /dev/null 2>&1 && echo "Docker ready" || (echo "Docker not available - enable Privileged mode"; exit 1)
      - IMAGE_REPO_NAME=${IMAGE_REPO_NAME:-ploclo-cms}
      - BACKEND_IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:backend-latest"
      - FRONTEND_IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:frontend-latest"
      - echo "Backend image  -> $BACKEND_IMAGE"
      - echo "Frontend image -> $FRONTEND_IMAGE"
      - |
        cat > PLOCLO_cms/.env << EOF
        DATABASE_URL=$DATABASE_URL
        DB_HOST=$DB_HOST
        DB_PORT=$DB_PORT
        DB_USER=$DB_USER
        DB_PASSWORD=$DB_PASSWORD
        DB_NAME=$DB_NAME
        JWT_SECRET=$JWT_SECRET
        GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
        GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
        GOOGLE_CALLBACK_URL=$GOOGLE_CALLBACK_URL
        NODE_ENV=$NODE_ENV
        NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
        EOF
      - grep -q "^\.env$" PLOCLO_cms/.dockerignore 2>/dev/null || echo ".env" >> PLOCLO_cms/.dockerignore
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:                          # ← ต้องอยู่ใน phases ระดับนี้
    commands:
      - echo "[1/2] Docker build..."
      - docker build -t $BACKEND_IMAGE PLOCLO_cms/backend/
      - |
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
          -t $FRONTEND_IMAGE \
          PLOCLO_cms/frontend/

  post_build:                     # ← ต้องอยู่ใน phases ระดับนี้
    commands:
      - echo "[2/2] Push to ECR..."
      - docker push $BACKEND_IMAGE
      - docker push $FRONTEND_IMAGE
      - |
        printf '[{"name":"backend","imageUri":"%s"},{"name":"frontend","imageUri":"%s"}]' \
          "$BACKEND_IMAGE" "$FRONTEND_IMAGE" > imagedefinitions.json
      - python3 q_analyze_build.py "SUCCEEDED" "" "$BACKEND_IMAGE" "$FRONTEND_IMAGE" || true
      - cat q-build-analysis.txt || true

artifacts:
  files:
    - imagedefinitions.json
    - q-build-analysis.txt
  discard-paths: yes
  name: BuildArtifacts