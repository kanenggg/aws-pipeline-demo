version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci --prefix PLOCLO_cms
      - pip3 install semgrep

  pre_build:
    commands:
      - export PATH=$HOME/.local/bin:/usr/local/bin:$PATH   # ← แก้ exit 127
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

      - |
        cat > PLOCLO_cms/.env << EOF
        DATABASE_URL=$DATABASE_URL
        DB_HOST=$DB_HOST
        DB_PORT=$DB_PORT
        DB_USER=$DB_USER
        DB_PASSWORD=$DB_PASSWORD
        DB_NAME=$DB_NAME
        JWT_SECRET=$JWT_SECRET
        GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
        GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
        GOOGLE_CALLBACK_URL=$GOOGLE_CALLBACK_URL
        NODE_ENV=$NODE_ENV
        NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
        EOF

      - grep -q "^\.env$" PLOCLO_cms/.dockerignore 2>/dev/null || echo ".env" >> PLOCLO_cms/.dockerignore

      # ─── Semgrep SAST ──────────────────────────────────────
      - echo "[1/3] Semgrep SAST..."
      - semgrep scan --config p/default --error --quiet . --json > semgrep-report.json || true

      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | \
          docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "[2/3] Docker build..."
      - docker-compose -f PLOCLO_cms/docker-compose.yml build 2>&1

  post_build:
    commands:
      - echo "[3/3] Push + Inspector..."
      - docker-compose -f PLOCLO_cms/docker-compose.yml push

      # ─── Inspector CVE Poll ────────────────────────────────
      - |
        MAX_WAIT=300; ELAPSED=0; PREV=-1
        while [ $ELAPSED -lt $MAX_WAIT ]; do
          COUNT=$(aws inspector2 list-findings \
            --filter-criteria "{\"ecrImageRepositoryName\":[{\"comparison\":\"EQUALS\",\"value\":\"$IMAGE_REPO_NAME\"}]}" \
            --query 'length(findings)' --output text 2>/dev/null || echo 0)
          echo "  Inspector findings: $COUNT (${ELAPSED}s)"
          [ "$COUNT" = "$PREV" ] && [ $ELAPSED -gt 60 ] && break
          PREV=$COUNT; sleep 15; ELAPSED=$((ELAPSED+15))
        done

        aws inspector2 list-findings \
          --filter-criteria "{\"ecrImageRepositoryName\":[{\"comparison\":\"EQUALS\",\"value\":\"$IMAGE_REPO_NAME\"}],\"severity\":[{\"comparison\":\"EQUALS\",\"value\":\"CRITICAL\"}]}" \
          --output json > inspector-report.json

        CVE=$(python3 -c "import json; d=json.load(open('inspector-report.json')); print(len(d.get('findings',[])))")
        echo "Critical CVE: $CVE"
        if [ "$CVE" -gt "0" ]; then
          echo "BLOCKED: Critical CVE found"; exit 1
        fi

      # ─── Amazon Q Security Summary ─────────────────────────
      - |
        python3 -c "
        import json, os, datetime
        summary = {
          'timestamp': datetime.datetime.utcnow().isoformat(),
          'build_id': os.environ.get('CODEBUILD_BUILD_ID',''),
          'semgrep_findings': 0,
          'cve_critical': 0,
          'status': 'PASSED'
        }
        try:
          d = json.load(open('semgrep-report.json'))
          summary['semgrep_findings'] = len(d.get('results',[]))
        except: pass
        try:
          d = json.load(open('inspector-report.json'))
          summary['cve_critical'] = len(d.get('findings',[]))
        except: pass
        json.dump(summary, open('q-build-summary.json','w'), indent=2)
        print(json.dumps(summary, indent=2))
        "

      - |
        printf '[{"name":"backend","imageUri":"%s"},{"name":"frontend","imageUri":"%s"}]' \
          "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:backend-latest" \
          "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:frontend-latest" \
          > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - semgrep-report.json
    - inspector-report.json
    - q-build-summary.json
  discard-paths: yes
  name: BuildArtifacts


  version: 0.2

env:
  variables:
    REPO_NAME: "PLOCLO_cms"
    BRANCH_NAME: "main"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci --prefix PLOCLO_cms

  build:
    commands:
      # ─── Unit + Integration Tests ──────────────────────────
      - echo "[1/3] Running tests..."
      - npm test --prefix PLOCLO_cms
      - npm run test:integration --prefix PLOCLO_cms

      # ─── npm audit ────────────────────────────────────────
      - echo "[2/3] npm audit..."
      - |
        npm audit --prefix PLOCLO_cms --json > audit-report.json || true
        CRITICAL=$(cat audit-report.json | python3 -c "
        import sys,json; d=json.load(sys.stdin)
        print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))")
        echo "Critical: $CRITICAL"
        if [ "$CRITICAL" -gt "0" ]; then
          echo "BLOCKED: critical npm vulnerabilities"; exit 1
        fi

      # ─── CodeGuru Security (Q-powered) ───────────────────
      - echo "[3/3] Amazon Q Security Scan..."
      - |
        SCAN_NAME="q-scan-$CODEBUILD_BUILD_NUMBER"

        zip -r source.zip PLOCLO_cms/ \
          --exclude "PLOCLO_cms/node_modules/*" \
          --exclude "PLOCLO_cms/.env"

        aws codeguru-security create-upload-url \
          --scan-name $SCAN_NAME \
          --output json > upload-info.json

        S3_URL=$(python3 -c "import json; print(json.load(open('upload-info.json'))['s3Url'])")
        CODE_ID=$(python3 -c "import json; print(json.load(open('upload-info.json'))['codeArtifactId'])")

        curl -X PUT -T source.zip "$S3_URL"

        aws codeguru-security create-scan \
          --resource-id "{\"codeArtifact\":{\"codeArtifactId\":\"$CODE_ID\"}}" \
          --scan-name $SCAN_NAME \
          --scan-type Standard

        ELAPSED=0
        while [ $ELAPSED -lt 300 ]; do
          STATUS=$(aws codeguru-security get-scan \
            --scan-name $SCAN_NAME \
            --query 'scanState' --output text)
          echo "  Q Scan: $STATUS (${ELAPSED}s)"
          [ "$STATUS" = "Successful" ] || [ "$STATUS" = "Failed" ] && break
          sleep 15; ELAPSED=$((ELAPSED+15))
        done

        aws codeguru-security get-findings \
          --scan-name $SCAN_NAME \
          --output json > q-security-findings.json

        BLOCK=$(python3 -c "
        import json
        d = json.load(open('q-security-findings.json'))
        block = [f for f in d.get('findings',[]) if f.get('severity') in ['Critical','High']]
        print(len(block))")

        if [ "$BLOCK" -gt "0" ]; then
          echo "BLOCKED: Q found $BLOCK Critical/High issues"; exit 1
        fi
        echo "Q Security Scan passed"